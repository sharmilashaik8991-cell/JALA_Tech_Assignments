<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Semantic Elements Example</title>
<style>
  body {
    font-family: Arial, sans-serif;
    padding: 20px;
    background-color: #fff8dc;
  }
  form {
    border: 2px solid #008080;
    padding: 15px;
    margin-bottom: 20px;
    background-color: #e0ffff;
  }
  input, button {
    padding: 5px 10px;
    margin: 5px 0;
  }
  table {
    border-collapse: collapse;
    width: 60%;
    margin-bottom: 20px;
  }
  table, th, td {
    border: 1px solid #333;
    padding: 10px;
    text-align: center;
  }
  article {
    border: 2px solid #333;
    padding: 15px;
    background-color: #f5f5f5;
  }
</style>
</head>
<body>
<h1>Semantic Elements Example</h1>

<!-- Form -->
<form>
  <label for="name">Name:</label>
  <input type="text" id="name" placeholder="Enter your name">
  <button type="submit">Submit</button>
</form>

<!-- Table -->
<table>
  <tr>
    <th>Item</th>
    <th>Price</th>
  </tr>
  <tr>
    <td>Apple</td>
    <td>$1</td>
  </tr>
  <tr>
    <td>Banana</td>
    <td>$0.5</td>
  </tr>
</table>

<!-- Article -->
<article>
  <h2>Article Example</h2>
  <p>This article represents self-contained content that can be independently distributed. Semantic elements help browsers and assistive technologies understand your page.</p>
</article>

</body>
</html>
