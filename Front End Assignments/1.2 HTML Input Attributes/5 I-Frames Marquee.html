<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I-frame and Marquee Demo</title>
    <style>
        body { font-family: Arial; padding: 30px; background-color: #f0f8ff; text-align: center; }
        h2 { color: #ff6600; }
        iframe { border: 2px solid #333; margin: 20px 0; }
    </style>
</head>
<body>
    <h2>I-frame and Marquee Demo</h2>

    <marquee behavior="scroll" direction="left" scrollamount="5" style="color: red; font-size: 20px;">
        Welcome to My Web Page! Enjoy Browsing!
    </marquee>

    <iframe src="https://www.wikipedia.org" width="600" height="400" title="Wikipedia"></iframe>
</body>
</html>
