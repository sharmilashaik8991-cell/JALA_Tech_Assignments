<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Attribute Example</title>
    <style>
        body { font-family: Arial; padding: 30px; background-color: #f0f8ff; }
        h2 { color: #ff6600; }
        a { display: block; margin: 10px 0; font-size: 18px; }
    </style>
</head>
<body>
    <h2>Target Attribute Demo</h2>
    <a href="https://www.google.com" target="_blank">Open Google in new tab (_blank)</a>
    <a href="https://www.wikipedia.org" target="_self">Open Wikipedia in same tab (_self)</a>
    <a href="https://www.example.com" target="_parent">Open Example.com in parent frame (_parent)</a>
</body>
</html>
