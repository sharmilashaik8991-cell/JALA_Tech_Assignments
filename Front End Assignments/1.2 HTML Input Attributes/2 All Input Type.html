<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Input Types</title>
    <style>
        body { font-family: Arial; padding: 30px; background-color: #f0f8ff; }
        h2 { color: #ff6600; }
        input { margin: 5px 0; padding: 5px; font-size: 16px; }
        label { display: block; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>HTML5 Input Types</h2>
    <form>
        <label>Number: <input type="number" name="num" min="0" max="100"></label>
        <label>Range: <input type="range" name="range" min="0" max="50"></label>
        <label>Color: <input type="color" name="color"></label>
        <label>Date: <input type="date" name="date"></label>
        <label>Time: <input type="time" name="time"></label>
        <label>Month: <input type="month" name="month"></label>
        <label>Week: <input type="week" name="week"></label>
        <label>Email: <input type="email" name="email" placeholder="Enter email"></label>
        <label>File: <input type="file" name="file"></label>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
