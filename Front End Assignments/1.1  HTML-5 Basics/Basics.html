<!DOCTYPE html>
<html>
<head>
    <title>Basics HTML Page</title>
</head>

<body>

    <!-- Heading -->
    <h1>Welcome to My Web Page</h1>

    <!-- Paragraph with Bold and Italic -->
    <p>This is a <b>basic HTML</b> page with <i>different tags</i> included.</p>

    <!-- Anchor -->
    <p>Visit <a href="https://www.example.com">Example Website</a></p>

    <!-- Unordered List -->
    <h3>My Favorite Items</h3>
    <ul>
        <li>Apples</li>
        <li>Bananas</li>
        <li>Oranges</li>
    </ul>

    <!-- Label -->
    <label for="name">Enter your name:</label>
    <input type="text" id="name" name="name">

    <!-- Blockquote -->
    <blockquote>
        "This is a sample blockquote to display quoted text."
    </blockquote>

    <!-- Horizontal Rule -->
    <hr>

    <!-- Image -->
    <h3>Sample Image</h3>
    <img src="https://www.freepik.com/free-photos-vectors/impressionant" >

    <!-- Division and Span -->
    <div>
        <p>This is inside a div element.</p>
        <p>This is a <span style="color:blue;">blue text</span> using span.</p>
    </div>

</body>
</html>
