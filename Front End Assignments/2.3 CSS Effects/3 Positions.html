<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Positioning</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; height:2000px; }

  .static { position: static; background-color: lightgray; padding: 10px; }
  .relative { position: relative; top: 10px; left: 10px; background-color: lightgreen; padding: 10px; }
  .absolute { position: absolute; top: 150px; left: 20px; background-color: lightblue; padding: 10px; }
  .fixed { position: fixed; top: 10px; right: 10px; background-color: coral; padding: 10px; }
  .sticky { position: sticky; top: 50px; background-color: yellow; padding: 10px; margin-top: 300px; }
</style>
</head>
<body>
<h2>CSS Positioning Examples</h2>

<div class="static">Static Position</div>
<div class="relative">Relative Position (shifted 10px)</div>
<div class="absolute">Absolute Position</div>
<div class="fixed">Fixed Position (top-right)</div>
<div class="sticky">Sticky Position (scroll down)</div>

<p>Scroll the page to see sticky and fixed positioning in action...</p>

</body>
</html>
