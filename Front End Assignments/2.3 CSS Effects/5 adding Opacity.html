<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Opacity Example</title>
<style>
  .opaque-image {
    width: 300px;
    transition: opacity 0.5s;
  }
  .opaque-image:hover {
    opacity: 0.5; /* changes opacity on hover */
    cursor: pointer;
  }
</style>
</head>
<body>
<h2 style="text-align:center;">Image Opacity Example</h2>
<img src="https://via.placeholder.com/300" alt="Example Image" class="opaque-image">
</body>
</html>
