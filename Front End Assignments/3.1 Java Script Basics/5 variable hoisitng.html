<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable Hoisting Example</title>
    <style>
        body { font-family: Arial; background-color: #f0f8ff; padding: 30px; }
        h2 { color: #ff6600; }
        p { font-size: 18px; color: #333; }
    </style>
</head>
<body>
    <h2>Variable Hoisting Example</h2>
    <p id="output"></p>

    <script>
        // Assign value before declaration
        x = 10; // This works because var is hoisted
        var x;

        document.getElementById("output").innerHTML = "Value of x after hoisting: " + x;
    </script>
</body>
</html>
