<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multiple Backgrounds Fixed</title>
<style>
  body {
    height: 500px; /* make sure body has enough height */
    background-image: 
      url('https://via.placeholder.com/150/FF0000/FFFFFF?text=BG1'),
      url('https://via.placeholder.com/100/0000FF/FFFFFF?text=BG2');
    background-position: left top, right bottom;
    background-repeat: no-repeat, no-repeat;
    background-size: 150px 150px, 100px 100px;
    margin: 0;
    padding: 0;
  }
  h1 {
    text-align: center;
    color: white;
    padding-top: 200px;
  }
</style>
</head>
<body>
<h1>Multiple Background Images Example</h1>
</body>
</html>
