<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Visibility & Display</title>
<style>
  .visible { visibility: visible; }
  .hidden { visibility: hidden; }
  .collapse { visibility: collapse; }

  .none { display: none; }
  .inline { display: inline; background-color: yellow; }
  .block { display: block; background-color: lightgreen; margin: 5px 0; }
  .contents { display: contents; background-color: lightpink; }
  .list-item { display: list-item; list-style-type: disc; }
</style>
</head>
<body>
<h2>Visibility Examples</h2>
<p class="visible">Visible Text</p>
<p class="hidden">Hidden Text (invisible)</p>
<p class="collapse">Collapse Text (space removed in tables/lists)</p>

<h2>Display Examples</h2>
<p class="none">None (This will not appear)</p>
<span class="inline">Inline Text</span>
<div class="block">Block Text</div>
<span class="contents">Contents Text (acts like normal)</span>
<ul>
  <li class="list-item">List Item Display</li>
</ul>
</body>
</html>
