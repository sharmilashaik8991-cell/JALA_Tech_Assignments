<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Padding vs Margin</title>
<style>
  .box1 {
    background-color: lightblue;
    padding: 50px;
    margin: 20px;
    text-align: center;
  }
  .box2 {
    background-color: lightgreen;
    padding: 10px;
    margin: 50px;
    text-align: center;
  }
</style>
</head>
<body>
<h2>Padding vs Margin</h2>
<div class="box1">Box 1: padding 50px, margin 20px</div>
<div class="box2">Box 2: padding 10px, margin 50px</div>
</body>
</html>
