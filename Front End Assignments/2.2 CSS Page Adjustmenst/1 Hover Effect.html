<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Table Hover Color</title>
<style>
  table {
    border: 2px solid black;
    border-collapse: collapse;
    width: 50%;
    margin: 20px auto;
  }
  th, td {
    border: 1px solid black;
    padding: 10px;
    text-align: center;
  }
  table:hover {
    background-color: lightblue;
  }
</style>
</head>
<body>
<h2 style="text-align:center;">Hover over the table to change its color</h2>
<table>
  <tr>
    <th>Item</th>
    <th>Price</th>
  </tr>
  <tr>
    <td>Apple</td>
    <td>$1</td>
  </tr>
  <tr>
    <td>Banana</td>
    <td>$0.5</td>
  </tr>
</table>
</body>
</html>
