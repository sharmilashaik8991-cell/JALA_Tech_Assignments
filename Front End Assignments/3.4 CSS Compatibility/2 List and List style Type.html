<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>List Style Example</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  ul.circle { list-style-type: circle; }
  ul.square { list-style-type: square; }
  ul.disc { list-style-type: disc; }
  ol.upper-roman { list-style-type: upper-roman; }
</style>
</head>
<body>

<h2>Unordered Lists</h2>
<ul class="circle">
  <li>Item 1</li>
  <li>Item 2</li>
  <li>Item 3</li>
</ul>

<ul class="square">
  <li>Item A</li>
  <li>Item B</li>
  <li>Item C</li>
</ul>

<ul class="disc">
  <li>Apple</li>
  <li>Banana</li>
  <li>Cherry</li>
</ul>

<h2>Ordered List</h2>
<ol class="upper-roman">
  <li>First</li>
  <li>Second</li>
  <li>Third</li>
</ol>

</body>
</html>
